<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moulinette SVG — Admin Configurateur</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #fff;
            --border: #e0e0e0;
            --primary: #1976d2;
            --primary-hover: #1565c0;
            --secondary: #5f6368;
            --error: #b3261e;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: #1a1a1a;
            padding: 24px;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h1 { margin: 0 0 4px 0; font-size: 1.5rem; font-weight: 600; }
        .header p { margin: 0; color: var(--secondary); font-size: 0.9rem; }

        .drop-zone {
            background: var(--card-bg);
            border: 2px dashed var(--border);
            border-radius: 8px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1rem;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            margin-bottom: 24px;
        }
        .drop-zone.dragover {
            background: rgba(25, 118, 210, 0.06);
            border-color: var(--primary);
            color: var(--primary);
        }

        .result-section {
            display: none;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 24px;
        }
        .result-section.visible { display: block; }

        .result-section h2 { margin: 0 0 16px 0; font-size: 1.1rem; font-weight: 600; }

        .files-loaded {
            font-size: 0.9rem;
            color: var(--secondary);
            margin: -8px 0 16px 0;
        }
        .files-loaded span { font-weight: 500; color: #1a1a1a; }

        .zones-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }
        .zone-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .zone-item:last-child { border-bottom: none; }
        .zone-swatch {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.15);
            cursor: pointer;
            flex-shrink: 0;
        }
        .zone-swatch:hover { opacity: 0.9; }
        .zone-label { font-weight: 500; min-width: 70px; }
        .zone-hex { font-family: ui-monospace, monospace; font-size: 0.85rem; color: var(--secondary); }
        .zone-color-input { width: 0; height: 0; opacity: 0; position: absolute; pointer-events: none; }
        .zone-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .btn-palette {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--secondary);
            cursor: pointer;
        }
        .btn-palette:hover { background: #f0f0f0; color: #1a1a1a; }
        .suggested-colors {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-left: 4px;
        }
        .suggested-color-btn {
            padding: 4px 8px;
            font-size: 0.78rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #f7f7f7;
            color: #444;
            cursor: pointer;
            white-space: nowrap;
        }
        .suggested-color-btn:hover {
            background: #e8f0fe;
            border-color: var(--primary);
            color: var(--primary);
        }

        .palette-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .palette-modal-overlay.show { display: flex; }
        .palette-modal {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .palette-modal h3 { margin: 0 0 12px 0; font-size: 1rem; padding: 16px 16px 0; }
        .palette-search-wrap { padding: 0 16px 12px; }
        .palette-search {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .palette-search::placeholder { color: #999; }
        .palette-list {
            overflow: auto;
            padding: 0 16px 16px;
            flex: 1;
            min-height: 200px;
        }
        .palette-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            width: 100%;
            text-align: left;
            background: none;
            font: inherit;
        }
        .palette-item:hover { background: #f0f4f8; }
        .palette-item-swatch {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.15);
            flex-shrink: 0;
        }
        .palette-item-code { font-weight: 600; font-size: 0.9rem; min-width: 64px; }
        .palette-item-nom { flex: 1; color: var(--secondary); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .palette-item-hex { font-family: ui-monospace, monospace; font-size: 0.8rem; color: #888; }

        .export-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary {
            background: var(--card-bg);
            color: var(--secondary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: #f5f5f5; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #323232;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transition: transform 0.25s, opacity 0.25s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .error-msg {
            background: rgba(179, 38, 30, 0.1);
            color: var(--error);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .preview-wrap {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .preview-wrap h3 { margin: 0 0 10px 0; font-size: 0.95rem; }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .preview-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fafafa;
            overflow: hidden;
        }
        .preview-item-label {
            padding: 8px 10px;
            font-size: 0.85rem;
            font-weight: 500;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        .preview-item-svg {
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }
        .preview-wrap .svg-preview {
            max-width: 100%;
            max-height: 220px;
            width: auto;
            height: auto;
        }
        .preview-item-svg .zone-highlight path,
        .preview-item-svg .zone-highlight rect,
        .preview-item-svg .zone-highlight circle,
        .preview-item-svg .zone-highlight ellipse,
        .preview-item-svg .zone-highlight polygon {
            stroke: var(--primary);
            stroke-width: 2px;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Moulinette SVG</h1>
        <p>Glissez un SVG brut (export Illustrator) pour générer les groupes zone-1, zone-2… par couleur de remplissage.</p>
    </header>

    <div id="drop-zone" class="drop-zone">
        Glissez-déposez un ou plusieurs fichiers SVG ici
    </div>

    <div id="result-section" class="result-section">
        <div id="error-msg" class="error-msg" style="display: none;"></div>
        <h2>Zones détectées</h2>
        <p id="files-loaded-line" class="files-loaded" style="display: none;"></p>
        <ul id="zones-list" class="zones-list"></ul>
        <div class="export-actions">
            <button type="button" id="btn-copy" class="btn btn-secondary">Copier le code SVG propre</button>
            <button type="button" id="btn-download" class="btn btn-primary">Télécharger le fichier .svg</button>
        </div>
        <div class="preview-wrap">
            <h3>Aperçu</h3>
            <div id="svg-preview-container" class="preview-grid"></div>
        </div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <div id="palette-modal-overlay" class="palette-modal-overlay" aria-hidden="true">
        <div class="palette-modal" role="dialog" aria-labelledby="palette-modal-title">
            <h3 id="palette-modal-title">Choisir une couleur du nuancier</h3>
            <div class="palette-search-wrap">
                <input type="text" id="palette-search" class="palette-search" placeholder="Référence (ex. BL001) ou nom de couleur…" autocomplete="off">
            </div>
            <div id="palette-list" class="palette-list"></div>
        </div>
    </div>

    <script>
        (function () {
            const FILLABLE = "path, rect, polygon, circle, ellipse";

            function normalizeHex(hex) {
                if (!hex || typeof hex !== "string") return "";
                const h = hex.replace(/#/g, "").trim().toLowerCase();
                if (h.length === 6) return "#" + h;
                if (h.length === 3) return "#" + h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
                return "#" + h;
            }

            function parseFillToHex(fill) {
                if (!fill || String(fill).trim() === "" || String(fill).toLowerCase() === "none") return null;
                const s = String(fill).trim();
                if (s.startsWith("#")) return normalizeHex(s) || null;
                const rgbMatch = s.match(/rgba?\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
                if (rgbMatch) {
                    const r = parseInt(rgbMatch[1], 10).toString(16).padStart(2, "0");
                    const g = parseInt(rgbMatch[2], 10).toString(16).padStart(2, "0");
                    const b = parseInt(rgbMatch[3], 10).toString(16).padStart(2, "0");
                    return "#" + r + g + b;
                }
                const div = document.createElement("div");
                div.style.color = s;
                div.style.display = "none";
                document.body.appendChild(div);
                const computed = getComputedStyle(div).color;
                document.body.removeChild(div);
                const m = computed.match(/rgba?\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
                if (m) {
                    const r = parseInt(m[1], 10).toString(16).padStart(2, "0");
                    const g = parseInt(m[2], 10).toString(16).padStart(2, "0");
                    const b = parseInt(m[3], 10).toString(16).padStart(2, "0");
                    return "#" + r + g + b;
                }
                return null;
            }

            function getElementFill(el) {
                let fill = el.getAttribute("fill") || el.style.fill || "";
                if (fill) return fill;
                try {
                    const computed = getComputedStyle(el).fill;
                    if (computed && computed !== "none") return computed;
                } catch (_) {}
                return "";
            }

            function analyzeSvg(svgText) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgText, "image/svg+xml");
                const svg = doc.querySelector("svg");
                if (!svg) return { error: "Aucun élément &lt;svg&gt; trouvé." };

                const viewBox = svg.getAttribute("viewBox");
                let effectiveViewBox = viewBox;
                if (!effectiveViewBox) {
                    const w = svg.getAttribute("width");
                    const h = svg.getAttribute("height");
                    const num = function (v) {
                        if (!v) return NaN;
                        var n = parseFloat(String(v).replace(/^([\d.]+).*$/, "$1"));
                        return isNaN(n) ? NaN : n;
                    };
                    const nw = num(w);
                    const nh = num(h);
                    if (nw > 0 && nh > 0) effectiveViewBox = "0 0 " + nw + " " + nh;
                }
                if (!effectiveViewBox) return { error: "Le SVG n'a pas d'attribut viewBox ni width/height utilisables." };

                const tempWrap = document.createElement("div");
                tempWrap.style.cssText = "position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;";
                tempWrap.appendChild(svg.cloneNode(true));
                document.body.appendChild(tempWrap);
                const svgInDoc = tempWrap.querySelector("svg");
                const shapes = svgInDoc.querySelectorAll(FILLABLE);

                const colorToElements = new Map();
                const order = [];
                const colorIdByKey = new Map();

                for (let i = 0; i < shapes.length; i++) {
                    const el = shapes[i];
                    const fillRaw = getElementFill(el);
                    const hex = parseFillToHex(fillRaw);
                    if (!hex) continue;
                    const key = normalizeHex(hex);
                    var colorIdFromSvg = "";
                    var parent = el.parentElement;
                    while (parent && parent !== svgInDoc) {
                        if (parent.getAttribute && parent.getAttribute("id") && /^zone-\d+$/.test(parent.getAttribute("id") || "")) {
                            var cid = parent.getAttribute("data-color-id");
                            if (cid) colorIdFromSvg = cid.trim();
                            break;
                        }
                        parent = parent.parentElement;
                    }
                    if (!colorToElements.has(key)) {
                        order.push(key);
                        colorToElements.set(key, []);
                        colorIdByKey.set(key, colorIdFromSvg);
                    }
                    if (colorIdFromSvg && !colorIdByKey.get(key)) colorIdByKey.set(key, colorIdFromSvg);
                    colorToElements.get(key).push(el.cloneNode(true));
                }
                document.body.removeChild(tempWrap);

                if (order.length === 0) return { error: "Aucune forme avec remplissage (fill) trouvée." };

                const groups = order.map((hex) => ({
                    hex: hex,
                    elements: colorToElements.get(hex),
                    colorIdFromSvg: colorIdByKey.get(hex) || ""
                }));

                return { viewBox: effectiveViewBox, groups, error: null };
            }

            function buildReconstructedSvg(viewBox, groups) {
                const ns = "http://www.w3.org/2000/svg";
                const svg = document.createElementNS(ns, "svg");
                svg.setAttribute("xmlns", ns);
                svg.setAttribute("viewBox", viewBox);
                groups.forEach(function (g) {
                    const group = document.createElementNS(ns, "g");
                    group.setAttribute("id", g.zoneId);
                    g.elements.forEach(function (el) {
                        el.setAttribute("fill", g.hex);
                        group.appendChild(el);
                    });
                    svg.appendChild(group);
                });
                return svg;
            }

            function serializeSvg(svgNode) {
                const indent = "  ";
                const groups = svgNode.querySelectorAll("g[id^='zone-']");
                let out = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + svgNode.getAttribute("viewBox") + '">\n';
                groups.forEach(function (g) {
                    var gAttrs = " id=\"" + g.id + "\"";
                    var cid = g.getAttribute("data-color-id");
                    if (cid) gAttrs += " data-color-id=\"" + (cid + "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "\"";
                    out += indent + "<g" + gAttrs + ">\n";
                    g.querySelectorAll(FILLABLE).forEach(function (el) {
                        const tag = el.tagName.toLowerCase();
                        const parts = [];
                        for (let i = 0; i < el.attributes.length; i++) {
                            const a = el.attributes[i];
                            const v = (a.value || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                            parts.push(a.name + '="' + v + '"');
                        }
                        out += indent + indent + "<" + tag + " " + parts.join(" ") + "/>\n";
                    });
                    out += indent + "</g>\n";
                });
                out += "</svg>";
                return out;
            }

            function showToast(message) {
                const toast = document.getElementById("toast");
                toast.textContent = message;
                toast.classList.add("show");
                setTimeout(function () { toast.classList.remove("show"); }, 2000);
            }

            let state = {
                files: [],
                globalZones: [],
                droppedFileNames: [],
                previewFileIndex: 0,
                highlightZoneIndex: null
            };

            let nuancierData = [];
            let paletteModalZoneIndex = null;

            function loadNuancier() {
                const path = "data/nuancier.json";
                return fetch(path)
                    .then(function (res) { return res.ok ? res.json() : Promise.reject(new Error("Fichier non trouvé")); })
                    .then(function (raw) {
                        if (!Array.isArray(raw)) return [];
                        return raw.map(function (c) {
                            const hasNew = typeof c.Color_ID !== "undefined" || typeof c["Nom couleur"] !== "undefined" || typeof c.Hex !== "undefined";
                            const id = hasNew ? (c.Color_ID || "") : (c.id || "");
                            const nom = hasNew ? (c["Nom couleur"] || "") : (c.nom || "");
                            const hexRaw = hasNew ? (c.Hex ? String(c.Hex).replace(/^#/, "") : "") : (c.hex || "").replace(/^#/, "");
                            const hex = hexRaw ? normalizeHex("#" + hexRaw) : "";
                            return { id: id, nom: nom, hex: hex };
                        }).filter(function (c) { return c.hex; });
                    })
                    .catch(function () { return []; });
            }

            function filterNuancier(query) {
                const q = (query || "").trim().toLowerCase();
                if (!q) return nuancierData.slice(0, 150);
                return nuancierData.filter(function (c) {
                    return (c.id && c.id.toLowerCase().indexOf(q) !== -1) ||
                        (c.nom && c.nom.toLowerCase().indexOf(q) !== -1) ||
                        (c.hex && c.hex.toLowerCase().indexOf(q) !== -1);
                }).slice(0, 150);
            }

            function hexToRgbComponents(hex) {
                const norm = normalizeHex(hex);
                const h = norm.replace("#", "");
                if (h.length !== 6) return null;
                const r = parseInt(h.slice(0, 2), 16);
                const g = parseInt(h.slice(2, 4), 16);
                const b = parseInt(h.slice(4, 6), 16);
                if ([r, g, b].some(function (v) { return Number.isNaN(v); })) return null;
                return [r, g, b];
            }

            function getClosestNuancierColors(hex, maxCount) {
                if (!hex || !nuancierData.length) return [];
                const base = hexToRgbComponents(hex);
                if (!base) return [];
                const r0 = base[0], g0 = base[1], b0 = base[2];
                const scored = [];
                nuancierData.forEach(function (c) {
                    const rgb = hexToRgbComponents(c.hex);
                    if (!rgb) return;
                    const dr = rgb[0] - r0;
                    const dg = rgb[1] - g0;
                    const db = rgb[2] - b0;
                    const dist = dr * dr + dg * dg + db * db;
                    scored.push({ color: c, dist: dist });
                });
                scored.sort(function (a, b) { return a.dist - b.dist; });
                return scored.slice(0, maxCount || 5).map(function (s) { return s.color; });
            }

            function syncZonesWithNuancier() {
                if (!nuancierData.length || !state.globalZones.length) return;
                state.globalZones.forEach(function (zone) {
                    if (!zone) return;
                    if (zone.selectedColorId) {
                        var byId = nuancierData.find(function (c) { return c.id === zone.selectedColorId; });
                        if (byId) zone.currentHex = byId.hex;
                        return;
                    }
                    var hex = zone.currentHex || zone.key;
                    if (!hex) return;
                    var exact = nuancierData.find(function (c) {
                        return normalizeHex(c.hex) === normalizeHex(hex);
                    });
                    if (exact) {
                        zone.currentHex = exact.hex;
                        zone.selectedColorId = exact.id || "";
                    }
                });
            }

            function openPaletteModal(zoneIndex) {
                paletteModalZoneIndex = zoneIndex;
                var overlay = document.getElementById("palette-modal-overlay");
                var searchInput = document.getElementById("palette-search");
                var titleEl = document.getElementById("palette-modal-title");
                var zoneId = "zone-" + (zoneIndex + 1);
                titleEl.textContent = "Couleur nuancier pour " + zoneId;
                overlay.classList.add("show");
                overlay.setAttribute("aria-hidden", "false");
                searchInput.value = "";
                searchInput.focus();
                renderPaletteList(filterNuancier(""));
            }

            function closePaletteModal() {
                var overlay = document.getElementById("palette-modal-overlay");
                overlay.classList.remove("show");
                overlay.setAttribute("aria-hidden", "true");
                paletteModalZoneIndex = null;
            }

            function renderPaletteList(items) {
                var listEl = document.getElementById("palette-list");
                listEl.innerHTML = "";
                if (items.length === 0) {
                    var empty = document.createElement("p");
                    empty.style.padding = "16px";
                    empty.style.color = "var(--secondary)";
                    empty.style.margin = "0";
                    empty.textContent = nuancierData.length === 0
                        ? "Nuancier non chargé. Ouvrez la page via un serveur local (même dossier que data/nuancier.json)."
                        : "Aucune couleur ne correspond à la recherche.";
                    listEl.appendChild(empty);
                    return;
                }
                items.forEach(function (c) {
                    var btn = document.createElement("button");
                    btn.type = "button";
                    btn.className = "palette-item";
                    var swatch = document.createElement("span");
                    swatch.className = "palette-item-swatch";
                    swatch.style.backgroundColor = c.hex;
                    var code = document.createElement("span");
                    code.className = "palette-item-code";
                    code.textContent = c.id;
                    var nom = document.createElement("span");
                    nom.className = "palette-item-nom";
                    nom.textContent = c.nom || "";
                    var hex = document.createElement("span");
                    hex.className = "palette-item-hex";
                    hex.textContent = c.hex;
                    btn.appendChild(swatch);
                    btn.appendChild(code);
                    btn.appendChild(nom);
                    btn.appendChild(hex);
                    btn.addEventListener("click", function () {
                        if (paletteModalZoneIndex === null || !state.globalZones[paletteModalZoneIndex]) return;
                        var zone = state.globalZones[paletteModalZoneIndex];
                        zone.currentHex = c.hex;
                        zone.selectedColorId = c.id || "";
                        closePaletteModal();
                        renderZonesList();
                        renderPreview();
                    });
                    listEl.appendChild(btn);
                });
            }

            document.getElementById("palette-search").addEventListener("input", function () {
                renderPaletteList(filterNuancier(this.value));
            });
            document.getElementById("palette-modal-overlay").addEventListener("click", function (e) {
                if (e.target === this) closePaletteModal();
            });
            document.addEventListener("keydown", function (e) {
                if (e.key === "Escape" && document.getElementById("palette-modal-overlay").classList.contains("show")) {
                    closePaletteModal();
                }
            });

            const dropZone = document.getElementById("drop-zone");
            const resultSection = document.getElementById("result-section");
            const errorEl = document.getElementById("error-msg");
            const zonesList = document.getElementById("zones-list");
            const previewContainer = document.getElementById("svg-preview-container");
            const btnCopy = document.getElementById("btn-copy");
            const btnDownload = document.getElementById("btn-download");

            function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
            ["dragenter", "dragover", "dragleave", "drop"].forEach(function (ev) {
                dropZone.addEventListener(ev, preventDefaults, false);
            });
            dropZone.addEventListener("dragover", function () { dropZone.classList.add("dragover"); });
            dropZone.addEventListener("dragleave", function () { dropZone.classList.remove("dragover"); });
            dropZone.addEventListener("drop", function (e) {
                dropZone.classList.remove("dragover");
                const dropped = Array.from(e.dataTransfer.files || []);
                const svgFiles = dropped.filter(function (file) {
                    return file && (file.type === "image/svg+xml" || /\.svg$/i.test(file.name));
                });
                if (!svgFiles.length) {
                    resultSection.classList.add("visible");
                    errorEl.style.display = "block";
                    errorEl.textContent = "Veuillez déposer un ou plusieurs fichiers SVG.";
                    return;
                }

                const readers = svgFiles.map(function (file) {
                    return new Promise(function (resolve) {
                        const reader = new FileReader();
                        reader.onload = function (ev) {
                            resolve({ file: file, text: ev.target.result });
                        };
                        reader.readAsText(file);
                    });
                });

                Promise.all(readers).then(function (results) {
                    const filesData = [];
                    const globalMap = new Map();
                    const globalOrder = [];
                    const failed = [];

                    results.forEach(function (res, fileIndex) {
                        const analysis = analyzeSvg(res.text);
                        const name = res.file.name || "fichier-" + (fileIndex + 1);
                        if (analysis.error) {
                            failed.push({ name: name, reason: analysis.error });
                            return;
                        }
                        const nameBase = res.file.name.replace(/\.svg$/i, "") || ("export-" + (fileIndex + 1));
                        filesData.push({
                            nameBase: nameBase,
                            viewBox: analysis.viewBox,
                            groups: analysis.groups
                        });
                    });

                    if (!filesData.length) {
                        resultSection.classList.add("visible");
                        errorEl.style.display = "block";
                        errorEl.textContent = "Aucun des fichiers SVG n'a pu être analysé (pas de viewBox ou pas de formes).";
                        if (failed.length) {
                            errorEl.textContent += " " + failed.map(function (f) { return f.name + " : " + f.reason; }).join(" ; ");
                        }
                        document.getElementById("files-loaded-line").style.display = "none";
                        return;
                    }

                    filesData.forEach(function (fileData, fileIndex) {
                        fileData.groups.forEach(function (g) {
                            const key = normalizeHex(g.hex);
                            if (!globalMap.has(key)) {
                                globalMap.set(key, { key: key, currentHex: key, selectedColorId: g.colorIdFromSvg || "", perFile: [] });
                                globalOrder.push(key);
                            }
                            globalMap.get(key).perFile.push({
                                fileIndex: fileIndex,
                                elements: g.elements
                            });
                        });
                    });

                    state.files = filesData;
                    state.droppedFileNames = filesData.map(function (f) { return f.nameBase; });
                    state.previewFileIndex = 0;
                    state.globalZones = globalOrder.map(function (key) { return globalMap.get(key); });

                    // Tente d'associer automatiquement les hex exacts au nuancier
                    syncZonesWithNuancier();

                    resultSection.classList.add("visible");
                    errorEl.style.display = "none";

                    var filesLine = document.getElementById("files-loaded-line");
                    filesLine.style.display = "block";
                    var count = filesData.length;
                    var names = state.droppedFileNames.map(function (n) { return n + ".svg"; }).join(", ");
                    filesLine.innerHTML = "<span>" + count + " fichier(s) chargé(s) : " + names + "</span>";
                    if (failed.length) {
                        filesLine.innerHTML += " — Non chargé(s) : " + failed.map(function (f) { return f.name; }).join(", ");
                    }

                    renderZonesList();
                    renderPreview();
                }).catch(function (err) {
                    resultSection.classList.add("visible");
                    errorEl.style.display = "block";
                    errorEl.textContent = "Erreur lors de la lecture des fichiers : " + (err && err.message ? err.message : "réessayez.");
                    document.getElementById("files-loaded-line").style.display = "none";
                });
            });

            loadNuancier().then(function (data) {
                nuancierData = data;
                // Après chargement du nuancier, synchroniser les zones déjà détectées
                syncZonesWithNuancier();
                renderZonesList();
                renderPreview();
            });

            function renderZonesList() {
                zonesList.innerHTML = "";
                state.globalZones.forEach(function (zone, index) {
                    const zoneId = "zone-" + (index + 1);
                    const li = document.createElement("li");
                    li.className = "zone-item";
                    li.setAttribute("data-zone-index", String(index));
                    li.addEventListener("mouseenter", function () {
                        state.highlightZoneIndex = index;
                        renderPreview();
                    });
                    li.addEventListener("mouseleave", function () {
                        state.highlightZoneIndex = null;
                        renderPreview();
                    });
                    const swatch = document.createElement("button");
                    swatch.type = "button";
                    swatch.className = "zone-swatch";
                    swatch.style.backgroundColor = zone.currentHex || zone.key;
                    swatch.setAttribute("aria-label", "Changer la couleur de " + zoneId);
                    const colorInput = document.createElement("input");
                    colorInput.type = "color";
                    colorInput.className = "zone-color-input";
                    colorInput.value = zone.currentHex || zone.key;
                    colorInput.setAttribute("data-zone-index", String(index));
                    swatch.addEventListener("click", function () { colorInput.click(); });
                    colorInput.addEventListener("input", function () {
                        const hex = colorInput.value;
                        const idx = parseInt(colorInput.getAttribute("data-zone-index"), 10);
                        const z = state.globalZones[idx];
                        z.currentHex = hex;
                        z.selectedColorId = "";
                        swatch.style.backgroundColor = hex;
                        spanHex.textContent = hex;
                        renderPreview();
                    });
                    const spanLabel = document.createElement("span");
                    spanLabel.className = "zone-label";
                    spanLabel.textContent = zoneId;
                    const spanHex = document.createElement("span");
                    spanHex.className = "zone-hex";
                    const displayHex = zone.currentHex || zone.key;
                    const selected = zone.selectedColorId && nuancierData.find(function (c) { return c.id === zone.selectedColorId; });
                    spanHex.textContent = selected ? (displayHex + " (" + selected.id + ")") : displayHex;
                    const actions = document.createElement("div");
                    actions.className = "zone-actions";
                    const suggestionsWrap = document.createElement("div");
                    suggestionsWrap.className = "suggested-colors";
                    const suggestions = getClosestNuancierColors(displayHex, 5).filter(function (c) {
                        return !zone.selectedColorId || c.id !== zone.selectedColorId;
                    });
                    suggestions.forEach(function (c) {
                        const btn = document.createElement("button");
                        btn.type = "button";
                        btn.className = "suggested-color-btn";
                        btn.textContent = c.id;
                        btn.title = (c.nom || "") + " • " + c.hex;
                        btn.addEventListener("click", function () {
                            zone.currentHex = c.hex;
                            zone.selectedColorId = c.id;
                            swatch.style.backgroundColor = c.hex;
                            spanHex.textContent = c.hex + " (" + c.id + ")";
                            renderPreview();
                        });
                        suggestionsWrap.appendChild(btn);
                    });
                    const btnPalette = document.createElement("button");
                    btnPalette.type = "button";
                    btnPalette.className = "btn-palette";
                    btnPalette.textContent = "Nuancier";
                    btnPalette.addEventListener("click", function () { openPaletteModal(index); });
                    actions.appendChild(suggestionsWrap);
                    actions.appendChild(btnPalette);
                    li.appendChild(swatch);
                    li.appendChild(colorInput);
                    li.appendChild(spanLabel);
                    li.appendChild(spanHex);
                    li.appendChild(actions);
                    zonesList.appendChild(li);
                });
            }

            function buildReconstructedSvgForFile(fileIndex) {
                const file = state.files[fileIndex];
                if (!file) return null;
                const ns = "http://www.w3.org/2000/svg";
                const svg = document.createElementNS(ns, "svg");
                svg.setAttribute("xmlns", ns);
                svg.setAttribute("viewBox", file.viewBox);
                state.globalZones.forEach(function (zone, index) {
                    const group = document.createElementNS(ns, "g");
                    group.setAttribute("id", "zone-" + (index + 1));
                    if (zone.selectedColorId) group.setAttribute("data-color-id", zone.selectedColorId);
                    if (state.highlightZoneIndex === index) group.setAttribute("class", "zone-highlight");
                    const perList = zone.perFile || [];
                    const per = perList.find(function (p) { return p.fileIndex === fileIndex; });
                    if (per && per.elements) {
                        per.elements.forEach(function (el) {
                            const clone = el.cloneNode(true);
                            const hex = zone.currentHex || zone.key;
                            clone.setAttribute("fill", hex);
                            group.appendChild(clone);
                        });
                    }
                    svg.appendChild(group);
                });
                return svg;
            }

            function renderPreview() {
                if (!state.files.length || !state.globalZones.length) return;
                previewContainer.innerHTML = "";
                state.files.forEach(function (file, fileIndex) {
                    const svg = buildReconstructedSvgForFile(fileIndex);
                    if (!svg) return;
                    const wrap = document.createElement("div");
                    wrap.className = "preview-item";
                    const label = document.createElement("div");
                    label.className = "preview-item-label";
                    label.textContent = state.droppedFileNames[fileIndex] || ("Fichier " + (fileIndex + 1));
                    const svgWrap = document.createElement("div");
                    svgWrap.className = "preview-item-svg";
                    svg.classList.add("svg-preview");
                    svg.removeAttribute("xmlns");
                    svgWrap.appendChild(svg);
                    wrap.appendChild(label);
                    wrap.appendChild(svgWrap);
                    previewContainer.appendChild(wrap);
                });
            }

            function getSvgString(fileIndex) {
                if (!state.files.length || !state.globalZones.length) return "";
                const idx = typeof fileIndex === "number" ? fileIndex : 0;
                const svg = buildReconstructedSvgForFile(idx);
                if (!svg) return "";
                return serializeSvg(svg);
            }

            btnCopy.addEventListener("click", function () {
                const str = getSvgString(0);
                if (!str) return;
                navigator.clipboard.writeText(str).then(function () {
                    showToast("Copié !");
                }).catch(function () {
                    showToast("Échec de la copie.");
                });
            });

            btnDownload.addEventListener("click", function () {
                if (!state.files.length || !state.globalZones.length) return;
                if (state.files.length === 1) {
                    const str = getSvgString(0);
                    if (!str) return;
                    const blob = new Blob([str], { type: "image/svg+xml" });
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = (state.droppedFileNames[0] || "export") + ".svg";
                    a.click();
                    URL.revokeObjectURL(a.href);
                    showToast("Téléchargement lancé.");
                    return;
                }
                if (typeof window.showDirectoryPicker !== "undefined") {
                    var baseName = "Moulinette-SVG-export";
                    window.showDirectoryPicker({ mode: "readwrite" }).then(function (parentHandle) {
                        function findUniqueFolderName() {
                            return new Promise(function (resolve) {
                                var n = 0;
                                function tryNext() {
                                    var name = n === 0 ? baseName : baseName + " (" + n + ")";
                                    parentHandle.getDirectoryHandle(name, { create: false }).then(function () {
                                        n++;
                                        tryNext();
                                    }).catch(function () {
                                        parentHandle.getDirectoryHandle(name, { create: true }).then(function (handle) {
                                            resolve({ handle: handle, name: name });
                                        });
                                    });
                                }
                                tryNext();
                            });
                        }
                        return findUniqueFolderName();
                    }).then(function (result) {
                        var folderHandle = result.handle;
                        var folderName = result.name;
                        var writes = state.files.map(function (file, index) {
                            var fileName = (state.droppedFileNames[index] || ("export-" + (index + 1))) + ".svg";
                            var str = getSvgString(index);
                            if (!str) return Promise.resolve();
                            return folderHandle.getFileHandle(fileName, { create: true }).then(function (fileHandle) {
                                return fileHandle.createWritable().then(function (writable) {
                                    writable.write(str);
                                    return writable.close();
                                });
                            });
                        });
                        return Promise.all(writes).then(function () { return folderName; });
                    }).then(function (folderName) {
                        showToast(state.files.length + " SVG enregistrés dans \u00ab " + folderName + " \u00bb.");
                    }).catch(function (err) {
                        if (err.name !== "AbortError") showToast("Erreur : " + (err.message || "impossible d\u2019enregistrer le dossier."));
                    });
                    return;
                }
                state.files.forEach(function (file, index) {
                    setTimeout(function () {
                        const str = getSvgString(index);
                        if (!str) return;
                        const blob = new Blob([str], { type: "image/svg+xml" });
                        const a = document.createElement("a");
                        a.href = URL.createObjectURL(blob);
                        a.download = (state.droppedFileNames[index] || ("export-" + (index + 1))) + ".svg";
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(a.href);
                    }, index * 200);
                });
                showToast("Téléchargement des " + state.files.length + " SVG. (Pour tout enregistrer dans un dossier, utilisez Chrome ou Edge.)");
            });
        })();
    </script>
</body>
</html>
